<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Адаптивная вёрстка - Вариант 0</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: #f0f0f0;
            padding: 20px;
        }
        .adaptive {
            width: 100%;
            max-width: 1280px;
            margin: 0 auto;
            background: white;
        }
        .header, .footer {
            background: #2c3e50;
            color: white;
            text-align: center;
            padding: 20px;
        }
        .nav {
            background: #27ae60;
            text-align: center;
            padding: 15px;
        }
        .nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
        }
        .row {
            display: flex;
            flex-wrap: wrap;
        }
        .block {
            background: #ecf0f1;
            text-align: center;
            padding: 60px 0;
            border: 1px solid #bdc3c7;
            box-sizing: border-box;
        }
        .social a {
            color: #f1c40f;
            margin: 0 10px;
            text-decoration: none;
        }

        /* По умолчанию (десктоп > 1024px) — 3 колонки */
        .block {
            width: 33.333%;
        }

        /* Планшет (768px - 1024px) — 2 колонки */
        @media (max-width: 1024px) and (min-width: 769px) {
            .block {
                width: 50%;
            }
        }

        /* Телефон (до 768px) — 1 колонка */
        @media (max-width: 768px) {
            .block {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="adaptive">
        <div class="header">Шапка (логотип)</div>
        <div class="nav">
            <a href="#">Главная</a>
            <a href="#">О нас</a>
            <a href="#">Услуги</a>
            <a href="#">Портфолио</a>
            <a href="#">Блог</a>
            <a href="#">Контакты</a>
        </div>
        <div class="row">
            <div class="block">1</div>
            <div class="block">4</div>
            <div class="block">5</div>
        </div>
        <div class="row">
            <div class="block">2</div>
            <div class="block">3</div>
            <div class="block">6</div>
        </div>
        <div class="footer">
            <p>© 2026 Адаптивная вёрстка</p>
            <div class="social">
                <a href="#">Facebook</a> | <a href="#">Instagram</a> | <a href="#">Twitter</a>
            </div>
        </div>
    </div>
</body>
</html>
